services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: candyflow
      POSTGRES_USER: candyflow
      POSTGRES_PASSWORD: candyflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U candyflow -d candyflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      DJANGO_DEBUG: "1"
      POSTGRES_DB: candyflow
      POSTGRES_USER: candyflow
      POSTGRES_PASSWORD: candyflow
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
